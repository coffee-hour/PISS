<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chibi Idle Adventure</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <header>
            <h1>Chibi Idle Adventure</h1>
            <div id="currency-display">Hearts: <span id="hearts">0</span></div>
        </header>
        
        <main>
            <div id="chibi-character-section">
                <div id="chibi-character" onclick="clickChibi()">
                    <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Lucky" alt="Chibi">
                </div>
                <p>Click the Chibi!</p>
            </div>

            <div id="upgrades-section">
                <h2>Upgrades</h2>
                <div class="upgrade" onclick="buyPet()">
                    <span class="name">Chibi Pet</span>
                    <span class="cost">Cost: <span id="pet-cost">10</span> Hearts</span>
                    <span class="owned">Owned: <span id="pets-owned">0</span></span>
                </div>
                <div class="upgrade" onclick="buyHouse()">
                    <span class="name">Chibi House</span>
                    <span class="cost">Cost: <span id="house-cost">100</span> Hearts</span>
                    <span class="owned">Owned: <span id="houses-owned">0</span></span>
                </div>
                <div class="upgrade" onclick="buyCastle()">
                    <span class="name">Chibi Castle</span>
                    <span class="cost">Cost: <span id="castle-cost">1000</span> Hearts</span>
                    <span class="owned">Owned: <span id="castles-owned">0</span></span>
                </div>
            </div>
        </main>

        <div id="stats">
            <p>Hearts per second: <span id="hps">0</span></p>
        </div>

        <footer>
            <p>Built for coffee-hour/PISS</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
