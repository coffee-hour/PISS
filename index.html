<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign: Ascension (v2.3.0)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="sovereign-clicker">
    <!-- Custom Cursor -->
    <div id="custom-cursor"></div>

    <div id="app" class="shake-layer">
        <!-- Fury Overlay -->
        <div id="fury-overlay"></div>

        <!-- Main Clicker Section -->
        <main class="throne-room">
            <div class="imperial-header">
                <div class="treasury-display">
                    <span class="label">Imperial Treasury</span>
                    <div class="value-container">
                        <i data-lucide="gem" class="icon-gold"></i>
                        <span id="treasury-count">0</span>
                    </div>
                    <span id="passive-rate" class="rate-text">+0/s</span>
                </div>
            </div>

            <div class="war-banner-container">
                <!-- Combo Gauge -->
                <div class="combo-gauge-container">
                    <div class="combo-label">Imperial Fury</div>
                    <div class="combo-meter">
                        <div id="combo-fill" class="combo-fill"></div>
                    </div>
                    <div id="combo-text" class="combo-text">COMBO x0</div>
                </div>

                <button id="click-banner" class="banner-btn" onmousedown="Sovereign.handleInteraction(event)">
                    <div class="banner-graphic">
                        <div id="crest-container" class="crest-wrapper">
                            <i data-lucide="castle" class="banner-icon crest-icon"></i>
                            <div class="crest-ornament"></div>
                        </div>
                        <div class="banner-glow"></div>
                    </div>
                    <div class="click-ripple-container"></div>
                </button>
                <div class="click-instructions">Strike the Crest to Ascend the Empire</div>
            </div>

            <div class="dispatch-footer">
                <div class="log-container" id="log-entries"></div>
            </div>
        </main>

        <!-- Sidebar Section -->
        <aside class="sidebar-terminal">
            <nav class="terminal-nav">
                <button class="tab-btn active" onclick="Sovereign.switchTab('garrison')">Garrison</button>
                <button class="tab-btn" onclick="Sovereign.switchTab('advancements')">Advancements</button>
            </nav>

            <div id="shop-garrison" class="shop-panel active">
                <div class="shop-header">
                    <h2><i data-lucide="swords"></i> Imperial Garrison</h2>
                    <p>Mobilize the military machine.</p>
                </div>
                <div class="upgrade-list" id="upgrade-container"></div>
            </div>

            <div id="shop-advancements" class="shop-panel">
                <div class="shop-header">
                    <h2><i data-lucide="trending-up"></i> Advancements</h2>
                    <p>Permanent logistical multipliers.</p>
                </div>
                <div class="upgrade-list" id="advancement-container"></div>
            </div>
        </aside>

        <!-- Dynamic Particle Canvas -->
        <canvas id="particle-canvas"></canvas>
        <div id="text-particle-container"></div>
    </div>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="app.js"></script>
</body>
</html>
