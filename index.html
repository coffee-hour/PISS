<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign: Imperial Clicker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="sovereign-clicker">
    <div id="app">
        <!-- Main Clicker Section -->
        <main class="throne-room">
            <div class="imperial-header">
                <div class="treasury-display">
                    <span class="label">Imperial Treasury</span>
                    <div class="value-container">
                        <i data-lucide="gem" class="icon-gold"></i>
                        <span id="treasury-count">0</span>
                    </div>
                    <span id="passive-rate" class="rate-text">+0/s</span>
                </div>
            </div>

            <div class="war-banner-container">
                <button id="click-banner" class="banner-btn" onclick="Sovereign.manualClick(event)">
                    <div class="banner-graphic">
                        <i data-lucide="shield" class="banner-icon"></i>
                        <div class="banner-glow"></div>
                    </div>
                    <div class="click-ripple-container"></div>
                </button>
                <div class="click-instructions">Strike the Banner to Fund the Empire</div>
            </div>

            <div class="dispatch-footer">
                <div class="log-container" id="log-entries"></div>
            </div>
        </main>

        <!-- Sidebar Upgrade Shop -->
        <aside class="military-shop">
            <div class="shop-header">
                <h2><i data-lucide="swords"></i> Imperial Garrison</h2>
                <p>Expend Treasury to bolster your forces.</p>
            </div>
            
            <div class="upgrade-list" id="upgrade-container">
                <!-- Upgrades populated by JS -->
            </div>
        </aside>

        <!-- Floating Particles -->
        <div id="particle-container"></div>
    </div>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="app.js"></script>
</body>
</html>
