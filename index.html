<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMBER RUNNER: THE GRID BREAKER</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --amber: #ff8c00;
            --amber-glow: rgba(255, 140, 0, 0.4);
            --obsidian: #050505;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            user-select: none;
        }

        body {
            background-color: var(--obsidian);
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--amber);
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        canvas {
            image-rendering: pixelated;
            width: 100%;
            height: auto;
            max-width: 500px;
            border: 4px solid var(--amber);
            box-shadow: 0 0 20px var(--amber-glow);
        }

        #ui-overlay {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            pointer-events: none;
        }

        #score-display {
            font-size: 2rem;
            text-shadow: 0 0 10px var(--amber);
        }

        #instructions {
            position: absolute;
            bottom: 40px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(5, 5, 5, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .hidden { display: none !important; }

        button {
            background: var(--amber);
            color: var(--obsidian);
            border: none;
            padding: 15px 30px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 800;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="ui-overlay">
            <div id="score-display">000000</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="instructions">TAP TO JUMP / HOLD TO FLY</div>
    </div>

    <div id="start-overlay" class="overlay">
        <h1 style="font-size: 2.5rem; margin-bottom: 10px;">AMBER RUNNER</h1>
        <p style="letter-spacing: 3px;">THE GRID BREAKER</p>
        <button id="start-btn">INITIALIZE CORE</button>
    </div>

    <div id="death-overlay" class="overlay hidden">
        <h1 style="color: #ff3c00;">CORE BREACH</h1>
        <p id="final-score">FINAL SCORE: 0</p>
        <button id="retry-btn">REBOOT SYSTEM</button>
    </div>

    <script type="module">
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score-display');
        const startOverlay = document.getElementById('start-overlay');
        const deathOverlay = document.getElementById('death-overlay');

        // High-DPI / Mobile Scaled resolution
        canvas.width = 400;
        canvas.height = 640;

        let state = {
            active: false,
            score: 0,
            speed: 5,
            frame: 0
        };

        const player = {
            x: 60,
            y: 0,
            w: 26,
            h: 26,
            vy: 0,
            gravity: 0.7,
            jumpPower: -11,
            hoverPower: -1.8,
            isGrounded: false,
            coreCharge: 100
        };

        let obstacles = [];
        let particles = [];

        function init() {
            document.getElementById('start-btn').onclick = start;
            document.getElementById('retry-btn').onclick = start;
            
            // Touch Controls
            let isTouching = false;
            window.addEventListener('touchstart', (e) => { 
                if(!state.active) return;
                isTouching = true;
                handleJump();
                e.preventDefault();
            }, { passive: false });

            window.addEventListener('touchend', () => { isTouching = false; });
            
            // Key Controls
            window.addEventListener('keydown', (e) => {
                if(e.code === 'Space') {
                    if(!state.active && startOverlay.classList.contains('hidden') === false) start();
                    isTouching = true;
                    handleJump();
                }
            });
            window.addEventListener('keyup', (e) => { if(e.code === 'Space') isTouching = false; });

            function handleJump() {
                if(player.isGrounded) {
                    player.vy = player.jumpPower;
                    player.isGrounded = false;
                    spawnParticles(player.x, player.y + player.h, '#ff8c00');
                }
            }

            // Game Loop
            function tick() {
                if(state.active) {
                    if(isTouching && !player.isGrounded && player.coreCharge > 0) {
                        player.vy += player.hoverPower;
                        player.coreCharge -= 1.5;
                        spawnParticles(player.x + player.w/2, player.y + player.h, '#ffea00');
                    }
                    update();
                }
                draw();
                requestAnimationFrame(tick);
            }
            tick();
        }

        function start() {
            state.active = true;
            state.score = 0;
            state.speed = 5.5;
            state.frame = 0;
            player.y = 200;
            player.vy = 0;
            player.coreCharge = 100;
            obstacles = [];
            particles = [];
            startOverlay.classList.add('hidden');
            deathOverlay.classList.add('hidden');
        }

        function gameOver() {
            state.active = false;
            document.getElementById('final-score').innerText = `FINAL SCORE: ${Math.floor(state.score)}`;
            deathOverlay.classList.remove('hidden');
        }

        function spawnParticles(x, y, color) {
            for(let i=0; i<3; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: Math.random() * 2,
                    life: 1.0,
                    color
                });
            }
        }

        function spawnObstacle() {
            const h = 40 + Math.random() * 120;
            const gap = 150 + Math.random() * 100;
            obstacles.push({
                x: canvas.width + 50,
                y: canvas.height - 40 - h,
                w: 30,
                h: h,
                passed: false
            });
        }

        function update() {
            state.frame++;
            state.score += 0.1 * state.speed;
            scoreEl.innerText = Math.floor(state.score).toString().padStart(6, '0');

            if(state.frame % 70 === 0) {
                spawnObstacle();
                state.speed += 0.05;
            }

            // Player Physics
            player.vy += player.gravity;
            player.y += player.vy;

            const groundY = canvas.height - 40;
            if(player.y + player.h > groundY) {
                player.y = groundY - player.h;
                player.vy = 0;
                player.isGrounded = true;
                player.coreCharge = Math.min(100, player.coreCharge + 0.5);
            }

            // Obstacles
            for(let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.x -= state.speed;

                // Collision
                if(player.x < obs.x + obs.w && player.x + player.w > obs.x &&
                   player.y < obs.y + obs.h && player.y + player.h > obs.y) {
                    gameOver();
                }

                if(obs.x + obs.w < 0) obstacles.splice(i, 1);
            }

            // Particles
            for(let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x -= state.speed * 0.5;
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.03;
                if(p.life <= 0) particles.splice(i, 1);
            }
        }

        function draw() {
            // Background
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Scanlines
            ctx.fillStyle = 'rgba(255, 140, 0, 0.03)';
            for(let i=0; i<canvas.height; i+=4) ctx.fillRect(0, i, canvas.width, 1);

            // Grid Ground
            ctx.strokeStyle = 'rgba(255, 140, 0, 0.2)';
            ctx.lineWidth = 1;
            const groundY = canvas.height - 40;
            for(let i=0; i<canvas.width; i+=40) {
                ctx.beginPath();
                ctx.moveTo(i - (state.frame * state.speed % 40), groundY);
                ctx.lineTo(i - (state.frame * state.speed % 40) - 20, canvas.height);
                ctx.stroke();
            }
            ctx.fillStyle = '#111';
            ctx.fillRect(0, groundY, canvas.width, 40);
            ctx.strokeStyle = '#ff8c00';
            ctx.lineWidth = 3;
            ctx.strokeRect(0, groundY, canvas.width, 1);

            // Obstacles
            ctx.fillStyle = '#111';
            ctx.strokeStyle = '#ff8c00';
            ctx.lineWidth = 2;
            obstacles.forEach(obs => {
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
                // Glow line on top
                ctx.fillStyle = '#ff8c00';
                ctx.fillRect(obs.x, obs.y, obs.w, 4);
            });

            // Particles
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.fillRect(p.x, p.y, 4, 4);
            });
            ctx.globalAlpha = 1.0;

            // Player (Amber Core)
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff8c00';
            ctx.fillStyle = '#ff8c00';
            ctx.fillRect(player.x, player.y, player.w, player.h);
            
            // Core Interior
            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x + 8, player.y + 8, player.w - 16, player.h - 16);
            ctx.shadowBlur = 0;

            // Core Charge Bar
            ctx.strokeStyle = '#ff8c00';
            ctx.strokeRect(10, 10, 100, 10);
            ctx.fillStyle = '#ff8c00';
            ctx.fillRect(10, 10, player.coreCharge, 10);
        }

        init();
    </script>
</body>
</html>
