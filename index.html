<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign: Progression (v3.2.0)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="fx-flash"></div>
    <canvas id="blood-canvas"></canvas>
    
    <div id="game-container">
        <div id="arena">
            <div id="environment" class="skyline"></div>
            
            <div id="enemy-target-container">
                <div id="enemy-character" class="enemy-character">
                    <div id="enemy-visual" class="enemy-sprite">
                        <div class="enemy-feature"></div>
                    </div>
                    <div id="enemy-aura" class="enemy-aura"></div>
                </div>
            </div>
        </div>

        <div id="hud">
            <div class="hud-top">
                <div class="hud-box condition">
                    <label>CONDITION</label>
                    <div class="bar-container">
                        <div id="player-hp" class="bar-fill"></div>
                    </div>
                </div>
                <div class="hud-box essence-display">
                    <label>VILTRUMITE ESSENCE</label>
                    <div class="essence-value">
                        <i data-lucide="zap"></i>
                        <span id="essence-count">0</span>
                    </div>
                </div>
                <div class="hud-box threat">
                    <label id="enemy-name">TARGET: ???</label>
                    <div class="bar-container">
                        <div id="enemy-hp" class="bar-fill"></div>
                    </div>
                </div>
            </div>

            <div class="hud-center">
                <div id="combat-log">COMMENCING SIMULATION...</div>
            </div>

            <div class="hud-bottom">
                <div class="progression-hud">
                    <div class="stat-pill">LEVEL <span id="level-num">1</span></div>
                    <div class="momentum-gauge-box">
                        <div id="momentum-fill"></div>
                    </div>
                    <button id="shop-btn" class="shop-trigger">
                        <i data-lucide="shopping-cart"></i> ABILITY SHOP
                    </button>
                </div>
            </div>
        </div>

        <div id="arms-container">
            <div class="arm arm-left"></div>
            <div class="arm arm-right"></div>
        </div>

        <div id="interaction-layer"></div>

        <!-- Overlays -->
        <div id="shop-overlay" class="overlay hidden">
            <div class="shop-content glass-panel">
                <h2>VILTRUMITE REINFORCEMENT</h2>
                <p>Spend Essence to augment your potential.</p>
                <div id="shop-list" class="shop-list"></div>
                <button class="close-btn" onclick="Fighter.toggleShop()">RETURN TO ARENA</button>
            </div>
        </div>

        <div id="death-overlay" class="overlay hidden">
            <div class="death-content">
                <h1 class="glitch-text">CONDITION LOST</h1>
                <p>YOU ARE NOT INVINCIBLE... YET.</p>
                <button class="retry-btn" onclick="location.reload()">RE-INITIALIZE</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="app.js"></script>
</body>
</html>
