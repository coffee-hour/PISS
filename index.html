<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN v5.0.0 - BATTLE ENGINE</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        #ui { position: absolute; top: 20px; left: 20px; color: #ff8c00; pointer-events: none; text-shadow: 2px 2px #000; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid #ff8c00; transform: translate(-50%, -50%); border-radius: 50%; opacity: 0.5; }
        #boss-hp-bar { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 400px; height: 12px; border: 2px solid #ff8c00; background: rgba(0,0,0,0.8); }
        #boss-hp-fill { width: 100%; height: 100%; background: #ff0000; transition: width 0.1s; }
    </style>
</head>
<body>
    <div id="ui">
        <div>KILLS: <span id="kills">0</span></div>
        <div>ENGINE: v5.0.0 (LOW-POLY)</div>
        <div>TIME SLOW: SPACEBAR</div>
    </div>
    <div id="boss-hp-bar"><div id="boss-hp-fill"></div></div>
    <div id="crosshair"></div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="app.js"></script>
</body>
</html>
