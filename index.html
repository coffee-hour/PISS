<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign AAA (v4.6.8)</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=468">
</head>
<body>
    <div id="ui-overlay">
        <header id="top-stat-bar">
            <div class="stat-group">
                <div class="bar-container"><div id="player-hp" class="bar-fill"></div></div>
            </div>
            <div class="stat-group" style="font-family: 'JetBrains Mono'; font-weight: 800;">
                <div>TIER: <span id="run-tier">1</span></div>
                <div class="bar-container" style="width: 100px;"><div id="xp-fill" class="bar-fill" style="background: #4caf50;"></div></div>
                <div>KILLS: <span id="enemies-defeated">0</span></div>
            </div>
        </header>

        <canvas id="minimap" width="200" height="200"></canvas>

        <div id="target-hud">
            <div id="enemy-name" class="target-label">SCANNING...</div>
            <div class="bar-container" style="width: 300px;"><div id="enemy-hp" class="bar-fill" style="background: #b71c1c;"></div></div>
        </div>

        <div id="fists">
            <div id="fist-left" class="fist"></div>
            <div id="crosshair"></div>
            <div id="fist-right" class="fist"></div>
        </div>
    </div>

    <!-- v4.6.8 FULL SCREEN MAP OVERLAY -->
    <div id="map-overlay" class="hidden">
        <div style="text-align: center; color: white; font-family: 'JetBrains Mono';">
            <h2 style="color: #ff8c00; margin-bottom: 10px;">CITY TACTICAL GRID</h2>
            <canvas id="map-canvas" width="800" height="800"></canvas>
            <p style="margin-top: 10px;">[M] TO CLOSE MAP</p>
        </div>
    </div>

    <div id="death-overlay" class="overlay hidden">
        <div class="glass-panel">
            <h1 style="color: #b71c1c; font-size: 3rem;">CONQUEST FAILED</h1>
            <p style="margin: 20px 0; color: #444;">THE VILTRUMITE EMPIRE PERSISTS.</p>
            <button onclick="location.reload()" class="skill-btn" style="background: #b71c1c; color: #fff; border: none;">RESTART SIMULATION</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module" src="app.js?v=468"></script>
</body>
</html>
