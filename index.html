<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign: Rogue-like (v3.2.1)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="fx-flash"></div>
    <canvas id="blood-canvas"></canvas>
    
    <div id="game-container">
        <div id="arena">
            <div id="environment" class="skyline"></div>
            
            <div id="enemy-target-container">
                <div id="enemy-character" class="enemy-character">
                    <div id="enemy-visual" class="enemy-sprite">
                        <div class="enemy-feature"></div>
                    </div>
                    <div id="enemy-aura" class="enemy-aura"></div>
                </div>
            </div>
        </div>

        <!-- Arms/Fists: Restored & Brought to Front -->
        <div id="arms-container">
            <div class="arm arm-left"></div>
            <div class="arm arm-right"></div>
        </div>

        <div id="hud">
            <div class="hud-top">
                <div class="hud-box condition">
                    <label>RUN CONDITION</label>
                    <div class="bar-container">
                        <div id="player-hp" class="bar-fill"></div>
                    </div>
                </div>
                <div class="hud-box run-stats">
                    <label>CONQUEST RUN</label>
                    <div class="run-value">
                        <span id="enemies-defeated">0</span> KILLS
                    </div>
                </div>
                <div class="hud-box threat">
                    <label id="enemy-name">TARGET: ???</label>
                    <div class="bar-container">
                        <div id="enemy-hp" class="bar-fill"></div>
                    </div>
                </div>
            </div>

            <div class="hud-center">
                <div id="combat-log">NEW RUN INITIALIZED...</div>
            </div>

            <div class="hud-bottom">
                <div class="progression-hud">
                    <div class="stat-pill">MODIFIER: <span id="run-modifier">STRENGTH +0</span></div>
                    <div class="momentum-gauge-box">
                        <div id="momentum-fill"></div>
                    </div>
                    <div class="stat-pill">TIER <span id="run-tier">1</span></div>
                </div>
            </div>
        </div>

        <div id="interaction-layer"></div>

        <!-- Overlays -->
        <div id="choice-overlay" class="overlay hidden">
            <div class="choice-content glass-panel">
                <h2>VICTORY SECURED</h2>
                <p>Choose an augmentation for this run.</p>
                <div id="choice-list" class="choice-list"></div>
            </div>
        </div>

        <div id="death-overlay" class="overlay hidden">
            <div class="death-content">
                <h1 class="glitch-text">RUN TERMINATED</h1>
                <p>THE EMPIRE FALLS WITH YOU.</p>
                <button class="retry-btn" onclick="Fighter.resetRun()">START NEW CONQUEST</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="app.js"></script>
</body>
</html>
