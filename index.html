<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invincible Showdown</title>
    <link rel="icon" id="favicon" type="image/png" href="">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid #ff8c00; transform: translate(-50%, -50%); border-radius: 50%; opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
    <script>
        // Blue Fist Favicon Render
        const canvas = document.createElement('canvas');
        canvas.width = 32;
        canvas.height = 32;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#1e88e5';
        ctx.beginPath();
        ctx.roundRect(4, 10, 24, 18, 5);
        ctx.fill();
        ctx.fillRect(8, 4, 4, 8);
        ctx.fillRect(14, 4, 4, 8);
        ctx.fillRect(20, 4, 4, 8);
        document.getElementById('favicon').href = canvas.toDataURL();
    </script>
    <script type="module" src="app.js"></script>
</body>
</html>
