<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign: Viltrumite Conflict (v3.1.0)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="fx-flash"></div>
    <div id="game-container">
        <div id="arena">
            <div id="environment" class="skyline"></div>
            
            <div id="enemy-target-container">
                <div id="enemy-character" class="enemy-character">
                    <div id="enemy-visual" class="enemy-sprite"></div>
                    <div id="enemy-emblem" class="enemy-emblem">V</div>
                    <div id="enemy-aura" class="enemy-aura"></div>
                </div>
            </div>

            <div id="fx-layer"></div>
        </div>

        <div id="hud">
            <div class="hud-top">
                <div class="hud-box condition">
                    <label>CONDITION</label>
                    <div class="bar-container">
                        <div id="player-hp" class="bar-fill"></div>
                    </div>
                </div>
                <div class="hud-box threat">
                    <label id="enemy-name">TARGET: ???</label>
                    <div class="bar-container">
                        <div id="enemy-hp" class="bar-fill"></div>
                    </div>
                </div>
            </div>

            <div class="hud-center">
                <div id="combat-log">WAITING FOR TARGET...</div>
            </div>

            <div class="hud-bottom">
                <div class="momentum-gauge-box">
                    <div class="momentum-label" id="momentum-text">MOMENTUM x0</div>
                    <div class="momentum-meter">
                        <div id="momentum-fill"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="arms-container">
            <div class="arm arm-left"></div>
            <div class="arm arm-right"></div>
        </div>

        <div id="interaction-layer"></div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="app.js"></script>
</body>
</html>
